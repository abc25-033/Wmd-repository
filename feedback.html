<!DOCTYPE html>
<html lang="en">
<head>
    <title>Feedback - Kingsman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">KINGSMAN</h1>
</header>

<section class="about">
    <h2>Customer Feedback</h2>

    <form>
        <input type="text" placeholder="Name" required><br><br>
        <input type="email" placeholder="Email" required><br><br>

        <label>Rate Us:</label><br>
        <input type="radio" name="rate" required> 1
        <input type="radio" name="rate"> 2
        <input type="radio" name="rate"> 3
        <input type="radio" name="rate"> 4
        <input type="radio" name="rate"> 5<br><br>

        <textarea placeholder="Your Feedback" required></textarea><br><br>

        <button type="submit">Submit</button>
    </form>
</section>

<footer>
    <p>&copy; 2026 Kingsman Suits</p>
</footer>

</body>
</html>
